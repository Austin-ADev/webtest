<!DOCTYPE html>
<html>
<head>
  <title>NeonVault</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="modal.css">
</head>
<body>

  <header class="nv-header">
    <h1 class="logo">NeonVault</h1>
    <div class="header-actions">
      <button id="openSettings" class="nv-btn">Settings</button>
      <button id="logoutBtn" class="nv-btn danger">Logout</button>
    </div>
  </header>

  <main class="nv-main">

    <section id="noteInput" class="nv-card">
      <textarea id="newNote" placeholder="Write a note..."></textarea>
      <button id="addNoteBtn" class="nv-btn primary">Add Note</button>
    </section>

    <section id="notesContainer" class="notes-grid"></section>

  </main>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <!-- Modal container -->
  <div id="modal" class="modal hidden">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
