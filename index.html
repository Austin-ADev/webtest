<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(148, 163, 184, 0.2); }
    .note-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .note-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(59 130 246 / 0.2); border-color: rgb(59 130 246); }
  </style>
</head>
<body class="min-h-screen text-white bg-gradient-to-br from-[#0a0f1c] to-[#1a2338]">

  <!-- Header -->
  <div id="header" class="hidden fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-5xl mx-auto px-8 py-4 flex items-center justify-between">
      <h1 class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">NeonVault</h1>
      
      <div class="flex items-center gap-6">
        <div onclick="toggleSettings()" class="flex items-center gap-3 cursor-pointer hover:bg-white/10 px-4 py-2 rounded-3xl transition">
          <img id="user-avatar" class="w-9 h-9 rounded-2xl ring-2 ring-blue-400/30 object-cover" src="">
          <div>
            <p id="user-name" class="text-sm font-semibold"></p>
            <p id="user-email-header" class="text-xs text-slate-400"></p>
          </div>
        </div>
        <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-white/10 transition">
          <i class="fas fa-cog text-2xl"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-5xl mx-auto pt-24 px-8">

    <!-- Auth Screen -->
    <div id="auth-screen" class="max-w-md mx-auto">
      <div class="text-center mb-12">
        <h1 class="text-6xl font-bold tracking-tighter bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">NeonVault</h1>
        <p class="text-slate-400 mt-3 text-xl">Beautiful cloud notes</p>
      </div>
      <div class="glass rounded-3xl p-10">
        <button onclick="signInWithGoogle()" class="w-full bg-white text-black font-semibold py-5 rounded-3xl flex items-center justify-center gap-4 text-xl mb-8 hover:shadow-xl">
          <i class="fab fa-google text-2xl"></i> Continue with Google
        </button>
        <div class="flex items-center gap-4 my-8">
          <div class="flex-1 h-px bg-slate-700"></div>
          <span class="text-slate-400 text-sm">OR</span>
          <div class="flex-1 h-px bg-slate-700"></div>
        </div>
        <div class="flex mb-8 border-b border-slate-700">
          <button onclick="switchTab(0)" id="tab-login" class="flex-1 pb-4 text-xl font-medium border-b-2 border-blue-500 text-white">Login</button>
          <button onclick="switchTab(1)" id="tab-signup" class="flex-1 pb-4 text-xl font-medium text-slate-400">Sign Up</button>
        </div>
        <input id="email" type="email" placeholder="you@email.com" class="w-full bg-slate-900 border border-slate-700 rounded-3xl px-7 py-5 text-lg focus:outline-none focus:border-blue-500 mb-5">
        <input id="password" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-3xl px-7 py-5 text-lg focus:outline-none focus:border-blue-500 mb-8">
        <button onclick="handleEmailAuth()" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-3xl font-semibold text-xl transition">
          <span id="btn-text">Login</span>
        </button>
        <p id="message" class="text-center mt-8 text-red-400"></p>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="glass rounded-3xl p-10">
        <div class="flex justify-between items-end mb-8">
          <h2 class="text-3xl font-semibold flex items-center gap-3">
            <i class="fas fa-sticky-note text-blue-400"></i> Your Notes <span id="note-count" class="text-base font-normal text-slate-400">(0)</span>
          </h2>
          <input id="search-input" onkeyup="performSearch()" placeholder="Search notes..." 
            class="bg-slate-900 border border-slate-700 focus:border-blue-500 rounded-3xl px-6 py-3 w-96 outline-none text-lg">
        </div>

        <div class="flex gap-4 mb-10">
          <input id="new-note" placeholder="Write a new note..." 
            class="flex-1 bg-slate-900 border border-slate-700 rounded-3xl px-7 py-5 text-lg focus:outline-none focus:border-emerald-500">
          <button onclick="addNote()" class="bg-emerald-600 hover:bg-emerald-700 px-12 rounded-3xl font-semibold text-lg">Add Note</button>
        </div>

        <div id="notes-list" class="space-y-6 min-h-[500px]"></div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="glass rounded-3xl w-full max-w-lg mx-6 p-10">
      <h3 class="text-3xl font-semibold mb-8">Settings</h3>
      <div class="space-y-8">
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium">Dark / Light Theme</p>
          </div>
          <button onclick="toggleTheme()" id="theme-btn" class="px-6 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 flex items-center gap-2">
            <i id="theme-icon" class="fas fa-moon"></i> <span id="theme-text">Dark</span>
          </button>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium">Auto-clear input after adding</p>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="auto-clear-toggle" checked class="sr-only peer" onchange="saveSettings()">
            <div class="w-12 h-6 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500"></div>
            <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full peer-checked:translate-x-6"></div>
          </label>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium">Confirm before deleting</p>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="confirm-toggle" class="sr-only peer" onchange="saveSettings()">
            <div class="w-12 h-6 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500"></div>
            <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full peer-checked:translate-x-6"></div>
          </label>
        </div>
      </div>
      <button onclick="toggleSettings()" class="mt-12 w-full py-5 bg-slate-800 hover:bg-slate-700 rounded-3xl text-xl font-medium">Close</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-8 right-8 glass px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3">
    <i id="toast-icon" class="text-xl"></i>
    <span id="toast-text" class="font-medium"></span>
  </div>

  <script type="module">
    // ================== CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
      authDomain: "webtest-4943a.firebaseapp.com",
      projectId: "webtest-4943a",
      storageBucket: "webtest-4943a.firebasestorage.app",
      messagingSenderId: "84924124626",
      appId: "1:84924124626:web:73098a19326ed1a4ec8c0b"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    enableIndexedDbPersistence(db).catch(() => {});

    let currentUser = null;
    let notesUnsubscribe = null;
    let allNotes = [];
    let fuse = null;
    let settings = { autoClear: true, confirmDelete: false, theme: 'dark' };

    function loadSettings() {
      const saved = localStorage.getItem('neonvault_settings');
      if (saved) settings = JSON.parse(saved);
      document.getElementById('auto-clear-toggle').checked = settings.autoClear;
      document.getElementById('confirm-toggle').checked = settings.confirmDelete;
      if (settings.theme === 'light') document.documentElement.classList.remove('dark');
      updateThemeUI();
    }

    function saveSettings() {
      settings.autoClear = document.getElementById('auto-clear-toggle').checked;
      settings.confirmDelete = document.getElementById('confirm-toggle').checked;
      localStorage.setItem('neonvault_settings', JSON.stringify(settings));
    }

    function updateThemeUI() {
      const icon = document.getElementById('theme-icon');
      const text = document.getElementById('theme-text');
      icon.className = settings.theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
      text.textContent = settings.theme === 'dark' ? 'Dark' : 'Light';
    }

    function toggleTheme() {
      settings.theme = settings.theme === 'dark' ? 'light' : 'dark';
      if (settings.theme === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');
      saveSettings();
      updateThemeUI();
    }

    function showToast(msg, success = true) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      document.getElementById('toast-icon').className = success ? "fas fa-check-circle text-emerald-400 text-xl" : "fas fa-exclamation-circle text-red-400 text-xl";
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2800);
    }

    function timeAgo(ts) {
      if (!ts) return "just now";
      const diff = (Date.now() - ts.toMillis()) / 1000;
      if (diff < 60) return "just now";
      if (diff < 3600) return Math.floor(diff/60) + "m ago";
      if (diff < 86400) return Math.floor(diff/3600) + "h ago";
      return Math.floor(diff/86400) + "d ago";
    }

    window.signInWithGoogle = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e) { console.error(e); showToast("Google sign-in failed", false); } };
    window.handleEmailAuth = async () => { /* same as before - omitted for brevity, keep your existing one or copy from previous */ };
    window.switchTab = (tab) => { /* keep from previous */ };
    window.logout = () => signOut(auth);

    window.addNote = async () => {
      const input = document.getElementById('new-note');
      const text = input.value.trim();
      if (!text || !currentUser) return;
      try {
        await addDoc(collection(db, "notes"), { userId: currentUser.uid, text, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        showToast("Note added ✨");
        if (settings.autoClear) input.value = '';
      } catch (e) { showToast("Failed to add note", false); }
    };

    window.deleteNote = async (id) => {
      if (settings.confirmDelete && !confirm("Delete this note?")) return;
      try {
        await deleteDoc(doc(db, "notes", id));
        showToast("Note deleted");
      } catch (e) { showToast("Delete failed", false); }
    };

    window.updateNote = async (id, text) => {
      if (!text.trim()) return;
      try { await updateDoc(doc(db, "notes", id), { text: text.trim(), updatedAt: serverTimestamp() }); } catch(e) {}
    };

    function performSearch() {
      const term = document.getElementById('search-input').value.trim();
      if (!term || !fuse) { renderNotes(allNotes); return; }
      const results = fuse.search(term).map(r => r.item);
      renderNotes(results);
    }

    function renderNotes(notes) {
      const container = document.getElementById('notes-list');
      container.innerHTML = notes.length ? '' : `<div class="text-center py-20 text-slate-400">No notes found</div>`;
      notes.forEach(note => {
        const div = document.createElement('div');
        div.className = "note-card glass rounded-3xl p-8";
        div.innerHTML = `
          <div contenteditable="true" onblur="updateNote('${note.id}', this.innerText)" class="text-slate-100 text-lg leading-relaxed outline-none min-h-[100px]">${note.text}</div>
          <div class="flex justify-between mt-6 text-xs text-slate-400">
            <span>${timeAgo(note.updatedAt || note.createdAt)}</span>
            <button onclick="deleteNote('${note.id}')" class="hover:text-red-400"><i class="fas fa-trash"></i></button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function loadNotes(user) {
      if (notesUnsubscribe) notesUnsubscribe();
      notesUnsubscribe = onSnapshot(query(collection(db, "notes"), orderBy("updatedAt", "desc")), (snap) => {
        allNotes = snap.docs.filter(d => d.data().userId === user.uid).map(d => ({id: d.id, ...d.data()}));
        document.getElementById('note-count').textContent = `(${allNotes.length})`;
        fuse = new Fuse(allNotes, { keys: ['text'], threshold: 0.3 });
        renderNotes(allNotes);
      });
    }

    function toggleSettings() {
      document.getElementById('settings-modal').classList.toggle('hidden');
    }

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      document.getElementById('auth-screen').classList.toggle('hidden', !!user);
      document.getElementById('dashboard').classList.toggle('hidden', !user);
      document.getElementById('header').classList.toggle('hidden', !user);

      if (user) {
        document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=3b82f6&color=fff`;
        document.getElementById('user-name').textContent = user.displayName || 'User';
        document.getElementById('user-email-header').textContent = user.email;
        loadSettings();
        loadNotes(user);
      }
    });

    loadSettings();
  </script>
</body>
</html>
