<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
    }
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .note-card {
      transition: all 0.2s ease;
    }
    .note-card:hover {
      transform: translateY(-2px);
      border-color: rgb(59 130 246);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <div class="max-w-lg mx-auto pt-10 px-6">
    
    <!-- Auth Screen -->
    <div id="auth-screen" class="space-y-8">
      <div class="text-center">
        <h1 class="text-5xl font-bold tracking-tight">NeonVault</h1>
        <p class="text-slate-400 mt-2">Your secure cloud notes</p>
      </div>

      <div class="glass rounded-3xl p-10">
        <!-- Google Sign In -->
        <button onclick="signInWithGoogle()" 
          class="w-full bg-white text-black font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-gray-100 transition text-lg mb-6">
          <i class="fab fa-google"></i>
          Continue with Google
        </button>

        <div class="flex items-center gap-4 my-6">
          <div class="h-px bg-slate-700 flex-1"></div>
          <span class="text-slate-500 text-sm">OR</span>
          <div class="h-px bg-slate-700 flex-1"></div>
        </div>

        <!-- Email Tabs -->
        <div class="flex border-b border-slate-700 mb-8">
          <button onclick="switchTab(0)" id="tab-login"
            class="flex-1 pb-4 text-lg font-medium border-b-2 border-blue-500 text-white">Login</button>
          <button onclick="switchTab(1)" id="tab-signup"
            class="flex-1 pb-4 text-lg font-medium text-slate-400">Sign Up</button>
        </div>

        <input id="email" type="email" placeholder="Email address"
          class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-blue-500 mb-4">

        <input id="password" type="password" placeholder="Password"
          class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-blue-500 mb-8">

        <button onclick="handleEmailAuth()" id="auth-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-semibold text-lg transition flex items-center justify-center gap-2">
          <span id="btn-text">Login</span>
          <i id="btn-spinner" class="hidden fas fa-spinner fa-spin"></i>
        </button>

        <p id="message" class="text-center mt-6 text-red-400 text-sm min-h-[24px]"></p>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="flex items-center justify-between mb-10">
        <div>
          <h2 class="text-4xl font-semibold flex items-center gap-3">
            Welcome back <span class="text-3xl">👋</span>
          </h2>
          <p id="user-email" class="text-slate-400 mt-1 text-lg"></p>
        </div>
        <button onclick="logout()" 
          class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 px-6 py-3 rounded-2xl transition font-medium">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </button>
      </div>

      <!-- Notes Section -->
      <div class="glass rounded-3xl p-8">
        <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
          <i class="fas fa-sticky-note"></i>
          Your Notes
        </h3>

        <!-- Add Note -->
        <div class="flex gap-3 mb-8">
          <input id="new-note" 
            placeholder="Write a new note..." 
            class="flex-1 bg-slate-800 border border-slate-600 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-emerald-500">
          <button onclick="addNote()" 
            class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-2xl font-semibold transition">
            Add
          </button>
        </div>

        <!-- Notes List -->
        <div id="notes-list" class="space-y-4 max-h-[480px] overflow-y-auto pr-2">
          <!-- Notes populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // ================== FIREBASE CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
      authDomain: "webtest-4943a.firebaseapp.com",
      projectId: "webtest-4943a",
      storageBucket: "webtest-4943a.firebasestorage.app",
      messagingSenderId: "84924124626",
      appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
      measurementId: "G-9MNX5MX0Z2"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signInWithPopup,
      GoogleAuthProvider,
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      deleteDoc, 
      doc,
      onSnapshot, 
      query, 
      orderBy, 
      serverTimestamp,
      enableIndexedDbPersistence 
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    enableIndexedDbPersistence(db).catch(() => {});

    let currentUser = null;
    let notesUnsubscribe = null;

    // Google Sign In
    window.signInWithGoogle = async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        showMessage(err.message.replace('Firebase: ', ''), 'red');
      }
    };

    // Email Auth
    window.handleEmailAuth = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('auth-btn');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');

      if (!email || !password) {
        showMessage("Please fill in all fields", "red");
        return;
      }

      btn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = "Please wait...";

      try {
        const isLogin = document.getElementById('tab-login').classList.contains('border-b-2');
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
        }
      } catch (err) {
        showMessage(err.message.replace('Firebase: ', ''), "red");
      } finally {
        btn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = document.getElementById('tab-login').classList.contains('border-b-2') ? 'Login' : 'Create Account';
      }
    };

    function showMessage(text, color = "red") {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `text-center mt-6 text-${color}-400 text-sm`;
    }

    window.switchTab = (tab) => {
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');
      const btnText = document.getElementById('btn-text');

      if (tab === 0) {
        loginTab.classList.add('border-b-2', 'border-blue-500', 'text-white');
        signupTab.classList.remove('border-b-2', 'border-blue-500', 'text-white');
        btnText.textContent = 'Login';
      } else {
        signupTab.classList.add('border-b-2', 'border-blue-500', 'text-white');
        loginTab.classList.remove('border-b-2', 'border-blue-500', 'text-white');
        btnText.textContent = 'Create Account';
      }
      document.getElementById('message').textContent = '';
    };

    window.logout = () => signOut(auth);

    // Add Note
    window.addNote = async () => {
      const input = document.getElementById('new-note');
      const text = input.value.trim();
      if (!text || !currentUser) return;

      try {
        await addDoc(collection(db, "notes"), {
          userId: currentUser.uid,
          text: text,
          createdAt: serverTimestamp()
        });
        input.value = '';
      } catch (e) {
        alert("Failed to save note. Check your connection.");
      }
    };

    // Delete Note
    window.deleteNote = async (noteId) => {
      if (!confirm("Delete this note?")) return;
      try {
        await deleteDoc(doc(db, "notes", noteId));
      } catch (e) {
        alert("Failed to delete note.");
      }
    };

    // Load Notes
    function loadNotes(user) {
      if (notesUnsubscribe) notesUnsubscribe();

      const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));

      notesUnsubscribe = onSnapshot(q, (snapshot) => {
        const container = document.getElementById('notes-list');
        container.innerHTML = '';

        let count = 0;
        snapshot.forEach((docSnap) => {
          const note = docSnap.data();
          if (note.userId !== user.uid) return;
          count++;

          const div = document.createElement('div');
          div.className = "note-card glass rounded-2xl p-5 flex justify-between items-start group";
          div.innerHTML = `
            <p class="text-slate-200 text-[17px] leading-relaxed flex-1">${note.text}</p>
            <button onclick="deleteNote('${docSnap.id}')" 
              class="text-slate-500 hover:text-red-400 transition opacity-0 group-hover:opacity-100 p-2 -mr-2">
              <i class="fas fa-trash text-lg"></i>
            </button>
          `;
          container.appendChild(div);
        });

        if (count === 0) {
          container.innerHTML = `
            <div class="text-center py-16 text-slate-400">
              <p class="text-xl">No notes yet.</p>
              <p class="mt-2">Add one above to get started ✨</p>
            </div>`;
        }
      });
    }

    // Auth State
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      const authScreen = document.getElementById('auth-screen');
      const dashboard = document.getElementById('dashboard');

      if (user) {
        authScreen.classList.add('hidden');
        dashboard.classList.remove('hidden');
        document.getElementById('user-email').textContent = user.email || user.displayName || "User";
        loadNotes(user);
      } else {
        authScreen.classList.remove('hidden');
        dashboard.classList.add('hidden');
        if (notesUnsubscribe) notesUnsubscribe();
      }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('auth-screen').classList.contains('hidden')) {
          const input = document.getElementById('new-note');
          if (document.activeElement === input) addNote();
        } else {
          handleEmailAuth();
        }
      }
    });
  </script>
</body>
</html>
