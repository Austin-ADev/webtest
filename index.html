<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.2); }
    .note-card { transition: all 0.25s ease; }
    .note-card:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.15); }
  </style>
</head>
<body class="min-h-screen text-white bg-gradient-to-br from-slate-950 to-blue-950">

  <!-- Header -->
  <div id="header" class="hidden fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">NeonVault</h1>
      
      <div class="flex items-center gap-4">
        <div onclick="toggleSettings()" class="flex items-center gap-3 cursor-pointer hover:bg-white/10 px-4 py-2 rounded-3xl transition">
          <img id="user-avatar" class="w-8 h-8 rounded-2xl object-cover ring-2 ring-blue-400" src="">
          <div>
            <p id="user-name" class="font-medium text-sm"></p>
            <p id="user-email" class="text-xs text-slate-400"></p>
          </div>
        </div>
        <button onclick="toggleSettings()" class="p-3 hover:bg-white/10 rounded-2xl transition">
          <i class="fas fa-cog text-xl"></i>
        </button>
        <button onclick="logout()" class="px-5 py-2 text-sm bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-2xl transition">Logout</button>
      </div>
    </div>
  </div>

  <div class="max-w-4xl mx-auto pt-20 px-6 pb-12">

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
      <div class="text-center mb-12">
        <h1 class="text-6xl font-bold tracking-tighter bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">NeonVault</h1>
        <p class="text-slate-400 text-xl mt-2">Your notes in the cloud</p>
      </div>

      <div class="glass rounded-3xl p-10 max-w-md mx-auto">
        <button onclick="signInWithGoogle()" 
          class="w-full bg-white text-black font-semibold py-5 rounded-3xl flex items-center justify-center gap-3 text-lg hover:bg-gray-100 transition mb-8">
          <i class="fab fa-google"></i> Continue with Google
        </button>

        <div class="flex items-center gap-4 my-6">
          <div class="h-px bg-slate-600 flex-1"></div>
          <span class="text-slate-500 text-sm">OR</span>
          <div class="h-px bg-slate-600 flex-1"></div>
        </div>

        <div class="flex border-b border-slate-700 mb-8">
          <button onclick="switchTab(0)" id="tab-login" class="flex-1 pb-4 text-lg font-medium border-b-2 border-blue-500 text-white">Login</button>
          <button onclick="switchTab(1)" id="tab-signup" class="flex-1 pb-4 text-lg font-medium text-slate-400">Sign Up</button>
        </div>

        <input id="email" type="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-700 rounded-3xl px-6 py-4 text-lg mb-4 focus:outline-none focus:border-blue-500">
        <input id="password" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-3xl px-6 py-4 text-lg mb-8 focus:outline-none focus:border-blue-500">

        <button onclick="handleEmailAuth()" id="auth-btn" 
          class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-3xl font-semibold text-lg transition">Login</button>

        <p id="message" class="text-center mt-6 text-red-400 text-sm"></p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
      <div class="glass rounded-3xl p-8">
        <div class="flex justify-between mb-8">
          <h2 class="text-3xl font-semibold">Your Notes <span id="note-count" class="text-slate-400 text-base">(0)</span></h2>
          <input id="search-input" onkeyup="filterNotes()" placeholder="Search notes..." 
            class="bg-slate-900 border border-slate-700 rounded-3xl px-6 py-3 w-80 focus:outline-none focus:border-blue-500">
        </div>

        <div class="flex gap-3 mb-10">
          <input id="new-note" placeholder="Write a new note..." 
            class="flex-1 bg-slate-900 border border-slate-700 rounded-3xl px-6 py-4 focus:outline-none focus:border-emerald-500">
          <button onclick="addNote()" class="bg-emerald-600 hover:bg-emerald-700 px-10 rounded-3xl font-medium">Add</button>
        </div>

        <div id="notes-list" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-8 max-w-sm w-full mx-4">
      <h3 class="text-2xl font-semibold mb-6">Settings</h3>
      <div class="space-y-6">
        <div class="flex justify-between items-center">
          <span>Auto-clear input</span>
          <input type="checkbox" id="auto-clear" checked onchange="saveSettings()" class="w-5 h-5 accent-blue-500">
        </div>
        <div class="flex justify-between items-center">
          <span>Confirm deletions</span>
          <input type="checkbox" id="confirm-delete" onchange="saveSettings()" class="w-5 h-5 accent-blue-500">
        </div>
      </div>
      <button onclick="toggleSettings()" class="mt-8 w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-3xl">Close</button>
    </div>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
      authDomain: "webtest-4943a.firebaseapp.com",
      projectId: "webtest-4943a",
      storageBucket: "webtest-4943a.firebasestorage.app",
      messagingSenderId: "84924124626",
      appId: "1:84924124626:web:73098a19326ed1a4ec8c0b"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let allNotes = [];
    let settings = { autoClear: true, confirmDelete: false };

    function loadSettings() {
      const saved = localStorage.getItem('nv_settings');
      if (saved) settings = JSON.parse(saved);
      document.getElementById('auto-clear').checked = settings.autoClear;
      document.getElementById('confirm-delete').checked = settings.confirmDelete;
    }

    function saveSettings() {
      settings.autoClear = document.getElementById('auto-clear').checked;
      settings.confirmDelete = document.getElementById('confirm-delete').checked;
      localStorage.setItem('nv_settings', JSON.stringify(settings));
    }

    function showToast(msg, success = true) {
      const toast = document.createElement('div');
      toast.style.position = 'fixed';
      toast.style.bottom = '20px';
      toast.style.right = '20px';
      toast.style.padding = '12px 20px';
      toast.style.borderRadius = '9999px';
      toast.style.background = success ? '#10b981' : '#ef4444';
      toast.style.color = 'white';
      toast.style.zIndex = '1000';
      toast.style.boxShadow = '0 10px 15px -3px rgb(0 0 0 / 0.3)';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function timeAgo(ts) {
      if (!ts) return "just now";
      const seconds = Math.floor((Date.now() - ts.toMillis()) / 1000);
      if (seconds < 60) return "just now";
      if (seconds < 3600) return Math.floor(seconds/60) + "m ago";
      return Math.floor(seconds/3600) + "h ago";
    }

    window.signInWithGoogle = async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (err) {
        console.error(err);
        showToast("Google sign-in failed. Check console.", false);
      }
    };

    window.handleEmailAuth = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showToast("Fill email and password", false);

      const btn = document.getElementById('auth-btn');
      btn.disabled = true;
      btn.textContent = "Please wait...";

      try {
        const isLogin = document.getElementById('tab-login').classList.contains('border-b-2');
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
        }
      } catch (err) {
        showToast(err.message.replace('Firebase: ', ''), false);
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    };

    window.switchTab = (n) => {
      const login = document.getElementById('tab-login');
      const signup = document.getElementById('tab-signup');
      if (n === 0) {
        login.classList.add('border-b-2', 'border-blue-500', 'text-white');
        signup.classList.remove('border-b-2', 'border-blue-500', 'text-white');
      } else {
        signup.classList.add('border-b-2', 'border-blue-500', 'text-white');
        login.classList.remove('border-b-2', 'border-blue-500', 'text-white');
      }
    };

    window.logout = () => signOut(auth);

    window.addNote = async () => {
      const input = document.getElementById('new-note');
      const text = input.value.trim();
      if (!text || !currentUser) return;

      try {
        await addDoc(collection(db, "notes"), {
          userId: currentUser.uid,
          text: text,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        showToast("Note added");
        if (settings.autoClear) input.value = "";
      } catch (e) {
        showToast("Failed to save note", false);
      }
    };

    window.deleteNote = async (id) => {
      if (settings.confirmDelete && !confirm("Delete this note?")) return;
      try {
        await deleteDoc(doc(db, "notes", id));
        showToast("Note deleted");
      } catch (e) {
        showToast("Delete failed", false);
      }
    };

    window.updateNote = async (id, newText) => {
      if (!newText.trim()) return;
      try {
        await updateDoc(doc(db, "notes", id), { text: newText.trim(), updatedAt: serverTimestamp() });
      } catch (e) {}
    };

    function filterNotes() {
      const term = document.getElementById('search-input').value.toLowerCase().trim();
      const filtered = term === "" ? allNotes : allNotes.filter(n => n.text.toLowerCase().includes(term));
      renderNotes(filtered);
    }

    function renderNotes(notes) {
      const container = document.getElementById('notes-list');
      container.innerHTML = '';

      if (notes.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-12">No notes yet. Add one above!</p>`;
        return;
      }

      notes.forEach(note => {
        const div = document.createElement('div');
        div.className = "note-card glass rounded-3xl p-6";
        div.innerHTML = `
          <div contenteditable="true" onblur="updateNote('${note.id}', this.innerText)" 
            class="text-slate-100 text-base leading-relaxed min-h-[60px] outline-none">${note.text}</div>
          <div class="flex justify-between items-center mt-4 text-xs text-slate-400">
            <span>${timeAgo(note.updatedAt || note.createdAt)}</span>
            <button onclick="deleteNote('${note.id}')" class="hover:text-red-400"><i class="fas fa-trash"></i></button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function loadNotes(user) {
      const q = query(collection(db, "notes"), orderBy("updatedAt", "desc"));
      onSnapshot(q, (snapshot) => {
        allNotes = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.userId === user.uid) allNotes.push({ id: doc.id, ...data });
        });
        document.getElementById('note-count').textContent = `(${allNotes.length})`;
        renderNotes(allNotes);
      });
    }

    window.toggleSettings = () => {
      document.getElementById('settings-modal').classList.toggle('hidden');
    };

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      document.getElementById('auth-screen').classList.toggle('hidden', !!user);
      document.getElementById('dashboard').classList.toggle('hidden', !user);
      document.getElementById('header').classList.toggle('hidden', !user);

      if (user) {
        document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email)}&background=2563eb&color=fff`;
        document.getElementById('user-name').textContent = user.displayName || "User";
        document.getElementById('user-email').textContent = user.email;
        loadSettings();
        loadNotes(user);
      }
    });

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!document.getElementById('dashboard').classList.contains('hidden')) {
          const input = document.getElementById('new-note');
          if (document.activeElement === input) addNote();
        }
      }
    });
  </script>
</body>
</html>
