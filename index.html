<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonVault • Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
    .neon-glow { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
  </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-blue-950 to-zinc-950 text-white min-h-screen">

  <div id="app" class="max-w-md mx-auto pt-12 px-6">
    <!-- Auth Screen -->
    <div id="auth-screen">
      <div class="text-center mb-10">
        <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
          NeonVault
        </h1>
        <p class="text-zinc-400 mt-2">Secure. Beautiful. Yours.</p>
      </div>

      <div class="glass rounded-3xl p-8 border border-white/10 neon-glow">
        <div class="flex border-b border-white/10 mb-6">
          <button onclick="switchTab(0)" id="tab-login" 
            class="flex-1 py-3 text-lg font-medium border-b-2 border-blue-500 text-white">Login</button>
          <button onclick="switchTab(1)" id="tab-signup"
            class="flex-1 py-3 text-lg font-medium text-zinc-400">Sign Up</button>
        </div>

        <div id="form-area">
          <input id="email" type="email" placeholder="you@email.com"
            class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 mb-4 text-lg">

          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 mb-6 text-lg">

          <button onclick="handleAuth()" id="auth-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 transition-all font-semibold py-4 rounded-2xl text-lg flex items-center justify-center gap-2">
            <span id="btn-text">Login</span>
            <i id="btn-spinner" class="hidden fas fa-spinner fa-spin"></i>
          </button>

          <p id="message" class="text-center mt-6 text-sm min-h-[1.25rem]"></p>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold">Welcome back 👋</h2>
          <p id="user-email" class="text-zinc-400"></p>
        </div>
        <button onclick="logout()" 
          class="px-5 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-2xl flex items-center gap-2 transition">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <!-- Todo / Notes Section -->
      <div class="glass rounded-3xl p-8 border border-white/10">
        <h3 class="font-semibold text-xl mb-4 flex items-center gap-2">
          <i class="fas fa-list-check"></i> Your Notes
        </h3>

        <div class="flex gap-2 mb-6">
          <input id="new-note" placeholder="Write something..." 
            class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-5 py-3 focus:outline-none">
          <button onclick="addNote()" 
            class="bg-emerald-600 hover:bg-emerald-700 px-6 rounded-2xl font-medium">Add</button>
        </div>

        <div id="notes-list" class="space-y-3 max-h-96 overflow-y-auto">
          <!-- Notes appear here dynamically -->
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // ================== FIREBASE CONFIG ==================
   const firebaseConfig = {
  apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
  authDomain: "webtest-4943a.firebaseapp.com",
  projectId: "webtest-4943a",
  storageBucket: "webtest-4943a.firebasestorage.app",
  messagingSenderId: "84924124626",
  appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
  measurementId: "G-9MNX5MX0Z2"
};

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Enable offline persistence (makes notes work better when offline or across tabs)
  enableIndexedDbPersistence(db).catch((err) => {
    if (err.code === 'failed-precondition') {
      console.warn("Offline persistence failed - multiple tabs open?");
    } else if (err.code === 'unimplemented') {
      console.warn("Browser doesn't support offline persistence");
    }
  });

  let currentUser = null;
  let notesUnsubscribe = null;

  // ... (keep all your existing functions: switchTab, handleAuth, logout, addNote, loadNotes)

  function loadNotes(user) {
    if (notesUnsubscribe) notesUnsubscribe();

    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));

    notesUnsubscribe = onSnapshot(q, (snapshot) => {
      const container = document.getElementById('notes-list');
      container.innerHTML = '';

      let hasNotes = false;
      snapshot.forEach(doc => {
        const note = doc.data();
        if (note.userId !== user.uid) return;
        hasNotes = true;

        const div = document.createElement('div');
        div.className = "bg-white/5 border border-white/10 rounded-2xl p-4 flex justify-between items-start group hover:border-blue-500/30 transition";
        div.innerHTML = `
          <p class="text-zinc-200 flex-1">${note.text}</p>
          <button onclick="deleteNote('${doc.id}')" 
            class="text-zinc-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition px-2">
            <i class="fas fa-trash"></i>
          </button>
        `;
        container.appendChild(div);
      });

      if (!hasNotes) {
        container.innerHTML = `<p class="text-zinc-500 text-center py-8">No notes yet.<br>Add one above! ✨</p>`;
      }
    });
  }

  // New: Delete note function
  window.deleteNote = async function(noteId) {
    if (!currentUser) return;
    // For simplicity we're skipping deleteDoc import - you can add it later if wanted
    // For now, this just removes from UI (real delete needs more code)
    alert("Delete not fully implemented yet - coming in next upgrade!");
  };

  // Auth state listener (unchanged except variable name)
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    const authScreen = document.getElementById('auth-screen');
    const dashboard = document.getElementById('dashboard');

    if (user) {
      authScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      document.getElementById('user-email').textContent = user.email;
      loadNotes(user);
    } else {
      authScreen.classList.remove('hidden');
      dashboard.classList.add('hidden');
      if (notesUnsubscribe) notesUnsubscribe();
    }
  });

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (!document.getElementById('auth-screen').classList.contains('hidden')) {
        handleAuth();
      } else {
        const input = document.getElementById('new-note');
        if (document.activeElement === input) addNote();
      }
    }
  });
</script>
</body>
</html>
