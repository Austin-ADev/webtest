<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NeonVault — Notes</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body class="min-h-screen text-slate-100">

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50"></div>

  <div class="app-shell">
    <div class="container-wide max-w-full mx-auto px-6 py-6 space-y-6 main-container">

      <!-- Header -->
      <header class="glass rounded-3xl px-6 py-4 flex items-center justify-between shadow-xl">
        <div class="flex items-center gap-4">
          <!-- NEW: CSS wordmark -->
          <div class="neon-wordmark" aria-hidden="false" role="img" title="NeonVault">
            <div class="neon-compact" aria-hidden="true">NV</div>
            <div style="display:flex;align-items:center;gap:12px;">
              <div class="neon-mark" aria-hidden="true">NV</div>
              <div style="display:flex;flex-direction:column;line-height:1;">
                <span class="neon-word">NeonVault</span>
                <span class="neon-tag">Modern, synced notes.</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="hidden lg:flex flex-col items-end text-sm">
            <span id="userName" class="font-medium text-slate-100"></span>
            <span id="userEmail" class="text-slate-400"></span>
          </div>

          <button id="avatarBtn" class="relative">
            <img id="userAvatar" src="" alt="avatar" class="header-avatar" />
            <span class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-emerald-400 border border-slate-900"></span>
          </button>
          <button id="logoutBtn" class="hidden lg:inline-flex px-3 py-1.5 rounded-xl text-xs font-medium bg-slate-900 hover:bg-slate-800 border border-slate-700">Logout</button>
        </div>
      </header>

      <!-- Top row -->
      <section class="grid lg:grid-cols-[2.2fr,1fr] gap-6">
        <div class="glass-soft rounded-3xl p-5 shadow-lg space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-100">New note</h2>
            <span class="nv-badge bg-slate-900/60 text-slate-300 border border-slate-700/60">Private</span>
          </div>
          <textarea id="newNote" placeholder="Capture a thought..." class="w-full min-h-[110px] px-4 py-3 rounded-2xl bg-slate-900/70 border border-slate-700 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
          <div class="flex justify-between items-center">
            <span class="text-xs text-slate-500">Synced to your account in real time.</span>
            <button id="addNoteBtn" class="px-4 py-2 rounded-2xl text-xs font-medium bg-indigo-500 hover:bg-indigo-400">Add note</button>
          </div>
        </div>

        <div class="glass-soft rounded-3xl p-5 shadow-lg space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-100">Search & Filters</h2>
            <span class="text-[10px] text-slate-500">Fuzzy search by content & time</span>
          </div>
          <input id="searchInput" type="text" placeholder="Search notes..." class="w-full px-4 py-3 rounded-2xl bg-slate-900/70 border border-slate-700 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <p class="text-xs text-slate-500">Powered by Fuse.js — type loosely, we’ll find it.</p>
        </div>
      </section>

      <!-- Notes list -->
      <section class="glass rounded-3xl p-6 shadow-xl min-h-[60vh]">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-slate-100">Your notes</h2>
          <span id="noteCount" class="text-xs text-slate-500"></span>
        </div>
        <div id="notesContainer" class="space-y-3 pr-1"></div>
        <p id="emptyState" class="text-xs text-slate-500 text-center py-6 hidden">No notes yet. Start by writing something above.</p>
      </section>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsOverlay" class="nv-overlay fixed inset-0 flex items-center justify-center z-40 hidden">
    <div class="glass-soft rounded-3xl w-full max-w-sm p-5 shadow-2xl">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold">Settings</h2>
        <button id="closeSettingsBtn" class="text-xs text-slate-400 hover:text-slate-200">✕</button>
      </div>

      <div class="space-y-4 text-sm">
        <label class="flex items-center justify-between gap-3">
          <span class="text-slate-200">Auto-clear input after adding</span>
          <input id="autoClearToggle" type="checkbox" class="h-4 w-4 rounded border-slate-500" />
        </label>

        <label class="flex items-center justify-between gap-3">
          <span class="text-slate-200">Confirm before deleting</span>
          <input id="confirmDeleteToggle" type="checkbox" class="h-4 w-4 rounded border-slate-500" />
        </label>
      </div>

      <div class="mt-5 flex justify-end">
        <button id="saveSettingsBtn" class="px-4 py-2 rounded-2xl text-xs font-medium bg-indigo-500 hover:bg-indigo-400">Save & Close</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    /* Inserted Firebase config (provided) */
    const firebaseConfig = {
      apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
      authDomain: "webtest-4943a.firebaseapp.com",
      projectId: "webtest-4943a",
      storageBucket: "webtest-4943a.firebasestorage.app",
      messagingSenderId: "84924124626",
      appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
      measurementId: "G-9MNX5MX0Z2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* Elements */
    const toastContainer = document.getElementById("toastContainer");
    const logoutBtn = document.getElementById("logoutBtn");
    const avatarBtn = document.getElementById("avatarBtn");
    const userAvatar = document.getElementById("userAvatar");
    const userNameEl = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");

    const newNoteEl = document.getElementById("newNote");
    const addNoteBtn = document.getElementById("addNoteBtn");
    const notesContainer = document.getElementById("notesContainer");
    const emptyState = document.getElementById("emptyState");
    const noteCount = document.getElementById("noteCount");
    const searchInput = document.getElementById("searchInput");

    const settingsOverlay = document.getElementById("settingsOverlay");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const autoClearToggle = document.getElementById("autoClearToggle");
    const confirmDeleteToggle = document.getElementById("confirmDeleteToggle");

    let currentUser = null;
    let allNotes = [];
    let fuse = null;
    let settings = { autoClear: true, confirmDelete: false };

    /* createToast with max 4 visible toasts */
    function createToast(title, subtitle = "", type = "info", duration = null) {
      const defaults = { success: 7000, warning: 9000, error: 12000, info: 7000 };
      const dur = duration == null ? (defaults[type] || 8000) : duration;
      const MAX_TOASTS = 4;
      while (toastContainer.children.length >= MAX_TOASTS) {
        const oldest = toastContainer.children[0];
        if (!oldest) break;
        oldest.classList.remove("nv-animate-in");
        oldest.classList.add("nv-animate-out");
        try { if (oldest._nvRaf) cancelAnimationFrame(oldest._nvRaf); } catch(e){}
        setTimeout(() => { if (oldest && oldest.parentNode) oldest.remove(); }, 220);
      }

      const el = document.createElement("div");
      const typeClass = type === "success" ? "nv-success" : type === "warning" ? "nv-warning" : "nv-error";
      el.className = `nv-toast nv-animate-in ${typeClass}`;

      const icon = type === "success" ? "✨" : type === "warning" ? "⚠️" : "🚫";
      el.innerHTML = `
        <div class="nv-icon">${icon}</div>
        <div class="nv-body">
          <div class="nv-title">${title}</div>
          <div class="nv-sub">${subtitle}</div>
        </div>
        <div class="nv-progress"><i></i></div>
      `;

      const progressBar = el.querySelector(".nv-progress > i");
      let start = Date.now();
      let remaining = dur;
      let rafId = null;
      let cancelled = false;

      function setProgress() {
        if (cancelled) return;
        const elapsed = Date.now() - start;
        const pct = Math.max(0, 1 - elapsed / dur);
        progressBar.style.transform = `scaleX(${pct})`;
        if (pct > 0) rafId = requestAnimationFrame(setProgress);
      }

      el._nvRaf = requestAnimationFrame(setProgress);

      el.addEventListener("mouseenter", () => {
        if (rafId) cancelAnimationFrame(rafId);
        remaining = Math.max(0, dur - (Date.now() - start));
      });
      el.addEventListener("mouseleave", () => {
        start = Date.now();
        const newDur = remaining;
        function resumeProgress() {
          if (cancelled) return;
          const elapsed = Date.now() - start;
          const pct = Math.max(0, 1 - elapsed / newDur);
          progressBar.style.transform = `scaleX(${pct})`;
          if (pct > 0) rafId = requestAnimationFrame(resumeProgress);
        }
        rafId = requestAnimationFrame(resumeProgress);
        el._nvRaf = rafId;
      });

      el.addEventListener("click", () => {
        if (cancelled) return;
        cancelled = true;
        el.classList.remove("nv-animate-in");
        el.classList.add("nv-animate-out");
        try { if (rafId) cancelAnimationFrame(rafId); } catch(e){}
        setTimeout(() => { if (el && el.parentNode) el.remove(); }, 220);
      });

      toastContainer.appendChild(el);

      const autoDismissTimer = setTimeout(() => {
        if (cancelled) return;
        cancelled = true;
        el.classList.remove("nv-animate-in");
        el.classList.add("nv-animate-out");
        try { if (rafId) cancelAnimationFrame(rafId); } catch(e){}
        setTimeout(() => { if (el && el.parentNode) el.remove(); }, 220);
      }, dur + 200);

      el._nvCancel = () => {
        cancelled = true;
        clearTimeout(autoDismissTimer);
        try { if (rafId) cancelAnimationFrame(rafId); } catch(e){}
        if (el && el.parentNode) el.remove();
      };

      return el;
    }

    /* Settings persistence */
    function loadSettings() {
      try {
        const raw = localStorage.getItem("neonvault-settings");
        if (raw) settings = JSON.parse(raw);
      } catch (e) { console.warn("loadSettings failed", e); }
      autoClearToggle.checked = !!settings.autoClear;
      confirmDeleteToggle.checked = !!settings.confirmDelete;
    }
    function saveSettings() {
      settings.autoClear = !!autoClearToggle.checked;
      settings.confirmDelete = !!confirmDeleteToggle.checked;
      localStorage.setItem("neonvault-settings", JSON.stringify(settings));
    }

    /* Time ago */
    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return "just now";
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min} min ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr} hr${hr > 1 ? "s" : ""} ago`;
      const d = Math.floor(hr / 24);
      return `${d} day${d > 1 ? "s" : ""} ago`;
    }

    /* Gravatar fallback (simple hash) */
    function md5(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; }
      return (h >>> 0).toString(16).padStart(8, '0');
    }
    function gravatarUrl(email) {
      const hash = md5((email||"").trim().toLowerCase());
      return `https://www.gravatar.com/avatar/${hash}?d=identicon`;
    }

    function setUserUI(user) {
      const name = user.displayName || user.email || "NeonVault User";
      const email = user.email || "";
      userNameEl.textContent = name;
      userEmailEl.textContent = email;
      let avatar = user.photoURL || "";
      if (!avatar && email) avatar = gravatarUrl(email);
      if (!avatar) avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1f2937&color=f9fafb`;
      userAvatar.src = avatar;
    }

    /* Build Fuse */
    function buildFuse() {
      try {
        fuse = new Fuse(allNotes, {
          keys: ["text", "createdString", "tags"],
          threshold: 0.35,
          ignoreLocation: true
        });
      } catch (e) {
        console.warn("Fuse build failed", e);
        fuse = null;
      }
    }

    /* Render notes (no IDs shown; auto-save on blur; delete is trash icon) */
    function renderNotes() {
      const q = searchInput.value.trim();
      let list = allNotes;
      if (q && fuse) {
        const results = fuse.search(q);
        list = results.map(r => r.item);
      }
      notesContainer.innerHTML = "";
      noteCount.textContent = list.length ? `${list.length} note${list.length>1?"s":""}` : "";
      emptyState.classList.toggle("hidden", list.length > 0);

      list.forEach(note => {
        const row = document.createElement("div");
        row.className = "flex items-start justify-between gap-3 px-3 py-2 rounded-2xl bg-slate-900/70 border border-slate-700/80";

        const left = document.createElement("div"); left.className = "flex-1";
        const textEl = document.createElement("div");
        textEl.className = "text-sm text-slate-100 outline-none";
        textEl.contentEditable = "true";
        textEl.textContent = note.text || "";

        let originalText = textEl.textContent;

        textEl.addEventListener("blur", async () => {
          const newText = textEl.textContent || "";
          if (newText === originalText) return;
          originalText = newText;
          try {
            await updateDoc(doc(db, "notes", note.id), { text: newText });
            createToast("Note saved", "Changes synced to the cloud", "success");
          } catch (e) {
            console.error("auto-save error", e);
            createToast("Save failed", e.message || "Try again", "error");
          }
        });

        textEl.addEventListener("keydown", (ev) => {
          if (ev.key === "Enter") {
            ev.preventDefault();
            textEl.blur();
          }
        });

        const meta = document.createElement("div");
        meta.className = "mt-1 text-[10px] text-slate-500 flex items-center gap-2";
        meta.innerHTML = `<span>${timeAgo(note.created || Date.now())}</span>`;

        left.appendChild(textEl); left.appendChild(meta);

        const right = document.createElement("div"); right.className = "flex flex-col gap-1 items-end";
        const delBtn = document.createElement("button");
        delBtn.className = "trash-btn";
        delBtn.title = "Delete note";
        delBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-.5.5H6a.5.5 0 0 1-.5-.5v-7z"/>
            <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 1 1 0-2h3.1a1 1 0 0 1 .9-.6h2a1 1 0 0 1 .9.6h3.1a1 1 0 0 1 1 1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
          </svg>
        `;

        delBtn.onclick = async () => {
          if (settings.confirmDelete) {
            if (!confirm("Delete this note?")) return;
          }
          try {
            await deleteDoc(doc(db, "notes", note.id));
            createToast("Note deleted", "Removed from cloud", "success");
          } catch (e) {
            console.error("deleteDoc error", e);
            createToast("Delete failed", e.message || "Try again", "error");
          }
        };

        right.appendChild(delBtn);
        row.appendChild(left); row.appendChild(right);
        notesContainer.appendChild(row);
      });
    }

    /* Subscribe notes with index-aware error handling (no index link shown) */
    function subscribeNotes(user) {
      const notesRef = collection(db, "notes");
      const qNotes = query(notesRef, where("userId", "==", user.uid), orderBy("created", "desc"));

      onSnapshot(qNotes,
        (snap) => {
          allNotes = [];
          snap.forEach(docSnap => {
            const data = docSnap.data();
            allNotes.push({
              id: docSnap.id,
              ...data,
              createdString: new Date(data.created || Date.now()).toISOString()
            });
          });
          buildFuse();
          renderNotes();
        },
        (err) => {
          console.error("onSnapshot error:", err);
          const msg = err && err.message ? err.message : "Failed to load notes";
          createToast("Failed to load notes", msg, "error");
        }
      );
    }

    /* Auth state */
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      setUserUI(user);
      loadSettings();
      subscribeNotes(user);
    });

    /* Add note */
    addNoteBtn.onclick = async () => {
      const text = newNoteEl.value.trim();
      if (!text) return createToast("Note empty", "Type something before adding", "warning");
      try {
        await addDoc(collection(db, "notes"), {
          userId: currentUser.uid,
          text,
          created: Date.now(),
          tags: []
        });
        createToast("Note added successfully ✨", "Your note has been saved to the cloud.", "success");
        if (settings.autoClear) newNoteEl.value = "";
      } catch (e) {
        console.error("addDoc error", e);
        createToast("Failed to add note", e.message || "Try again", "error");
      }
    };

    /* Search */
    searchInput.addEventListener("input", () => renderNotes());

    /* Logout */
    logoutBtn.onclick = async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (e) {
        console.error("signOut error", e);
        createToast("Logout failed", e.message || "Try again", "error");
      }
    };

    /* Settings modal */
    avatarBtn.onclick = () => settingsOverlay.classList.remove("hidden");
    closeSettingsBtn.onclick = () => settingsOverlay.classList.add("hidden");
    settingsOverlay.onclick = (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.add("hidden"); };
    saveSettingsBtn.onclick = () => { saveSettings(); createToast("Settings saved", "Preferences updated", "success"); settingsOverlay.classList.add("hidden"); };

    /* Expose createToast for debugging */
    window.NV_toast = createToast;
  </script>
</body>
</html>
