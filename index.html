<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeonVault – Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
    }
    .glass {
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148,163,184,0.35);
    }
    .glass-soft {
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(51,65,85,0.8);
    }
    .toast {
      animation: slideIn 0.35s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast-hide {
      opacity: 0 !important;
      transform: translateY(10px) scale(0.95) !important;
      transition: all 0.25s ease;
    }
  </style>
</head>
<body class="min-h-screen text-slate-100">

  <!-- Toasts -->
  <div id="toastContainer" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <!-- Main layout -->
  <div class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- Header -->
    <header class="glass rounded-3xl px-5 py-4 flex items-center justify-between shadow-xl">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-500 via-fuchsia-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/40">
          <span class="text-lg font-bold">NV</span>
        </div>
        <div>
          <h1 class="text-lg font-semibold tracking-tight">NeonVault</h1>
          <p class="text-xs text-slate-400">Modern, synced notes.</p>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden sm:flex flex-col items-end text-xs">
          <span id="userName" class="font-medium text-slate-100"></span>
          <span id="userEmail" class="text-slate-400"></span>
        </div>
        <button id="avatarBtn" class="relative">
          <img id="userAvatar" src="" alt="avatar"
               class="w-10 h-10 rounded-full border border-slate-500 shadow-md object-cover" />
          <span class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-emerald-400 border border-slate-900"></span>
        </button>
        <button id="logoutBtn"
                class="hidden sm:inline-flex px-3 py-1.5 rounded-xl text-xs font-medium bg-slate-900 hover:bg-slate-800 border border-slate-700">
          Logout
        </button>
      </div>
    </header>

    <!-- Note input + search -->
    <section class="grid md:grid-cols-[2fr,1fr] gap-4">
      <div class="glass-soft rounded-3xl p-4 shadow-lg space-y-3">
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-semibold text-slate-100">New note</h2>
        </div>
        <textarea id="newNote"
                  class="w-full min-h-[80px] text-sm px-3 py-2 rounded-2xl bg-slate-900/70 border border-slate-700/80 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  placeholder="Capture a thought..."></textarea>
        <div class="flex justify-between items-center">
          <span class="text-xs text-slate-500">Notes are private to your account.</span>
          <button id="addNoteBtn"
                  class="px-4 py-2 rounded-2xl text-xs font-medium bg-indigo-500 hover:bg-indigo-400 shadow-md shadow-indigo-500/40">
            Add note
          </button>
        </div>
      </div>

      <div class="glass-soft rounded-3xl p-4 shadow-lg space-y-3">
        <h2 class="text-sm font-semibold text-slate-100">Search & Filters</h2>
        <input id="searchInput" type="text" placeholder="Search notes..."
               class="w-full px-3 py-2 rounded-2xl bg-slate-900/70 border border-slate-700/80 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <p class="text-xs text-slate-500">Search is client-side and updates instantly.</p>
      </div>
    </section>

    <!-- Notes list -->
    <section class="glass rounded-3xl p-4 shadow-xl">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-slate-100">Your notes</h2>
        <span id="noteCount" class="text-xs text-slate-500"></span>
      </div>
      <div id="notesContainer" class="space-y-3 max-h-[60vh] overflow-y-auto pr-1"></div>
      <p id="emptyState" class="text-xs text-slate-500 text-center py-6 hidden">
        No notes yet. Start by writing something above.
      </p>
    </section>
  </div>

  <!-- Settings modal -->
  <div id="settingsOverlay"
       class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-40 hidden">
    <div class="glass-soft rounded-3xl w-full max-w-sm p-5 shadow-2xl">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold">Settings</h2>
        <button id="closeSettingsBtn"
                class="text-xs text-slate-400 hover:text-slate-200">✕</button>
      </div>

      <div class="space-y-4 text-sm">
        <label class="flex items-center justify-between gap-3">
          <span class="text-slate-200">Auto-clear input after adding</span>
          <input id="autoClearToggle" type="checkbox"
                 class="h-4 w-4 rounded border-slate-500" />
        </label>

        <label class="flex items-center justify-between gap-3">
          <span class="text-slate-200">Confirm before deleting</span>
          <input id="confirmDeleteToggle" type="checkbox"
                 class="h-4 w-4 rounded border-slate-500" />
        </label>
      </div>

      <div class="mt-5 flex justify-end">
        <button id="saveSettingsBtn"
                class="px-4 py-2 rounded-2xl text-xs font-medium bg-indigo-500 hover:bg-indigo-400 shadow-md shadow-indigo-500/40">
          Save & Close
        </button>
      </div>
    </div>
  </div>

  <!-- Firebase + App Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      updateDoc,
      deleteDoc,
      doc,
      query,
      where,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    // TODO: replace with your real config
  const firebaseConfig = {
  apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
  authDomain: "webtest-4943a.firebaseapp.com",
  projectId: "webtest-4943a",
  storageBucket: "webtest-4943a.firebasestorage.app",
  messagingSenderId: "84924124626",
  appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
  measurementId: "G-9MNX5MX0Z2"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const toastContainer = document.getElementById("toastContainer");
    const logoutBtn = document.getElementById("logoutBtn");
    const avatarBtn = document.getElementById("avatarBtn");
    const userAvatar = document.getElementById("userAvatar");
    const userNameEl = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");

    const newNoteEl = document.getElementById("newNote");
    const addNoteBtn = document.getElementById("addNoteBtn");
    const notesContainer = document.getElementById("notesContainer");
    const emptyState = document.getElementById("emptyState");
    const noteCount = document.getElementById("noteCount");
    const searchInput = document.getElementById("searchInput");

    const settingsOverlay = document.getElementById("settingsOverlay");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const autoClearToggle = document.getElementById("autoClearToggle");
    const confirmDeleteToggle = document.getElementById("confirmDeleteToggle");

    let currentUser = null;
    let allNotes = [];
    let settings = {
      autoClear: true,
      confirmDelete: false
    };

    function toast(message, type = "info") {
      const div = document.createElement("div");
      const colors = {
        info: "bg-slate-800/90 text-slate-100",
        success: "bg-emerald-500/90 text-white",
        error: "bg-red-500/90 text-white"
      };
      div.className =
        `toast px-4 py-2 rounded-xl text-sm shadow-xl cursor-pointer ${colors[type]}`;
      div.textContent = message;

      div.onclick = () => {
        div.classList.add("toast-hide");
        setTimeout(() => div.remove(), 250);
      };

      toastContainer.appendChild(div);

      setTimeout(() => {
        if (div.parentNode) {
          div.classList.add("toast-hide");
          setTimeout(() => div.remove(), 250);
        }
      }, 4000);
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem("neonvault-settings");
        if (raw) settings = JSON.parse(raw);
      } catch (e) {
        console.warn("Failed to load settings", e);
      }
      autoClearToggle.checked = settings.autoClear;
      confirmDeleteToggle.checked = settings.confirmDelete;
    }

    function saveSettings() {
      settings.autoClear = autoClearToggle.checked;
      settings.confirmDelete = confirmDeleteToggle.checked;
      localStorage.setItem("neonvault-settings", JSON.stringify(settings));
    }

    function timeAgo(ts) {
      const diff = Date.now() - ts;
      const sec = Math.floor(diff / 1000);
      if (sec < 60) return "just now";
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min} min ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr} hr${hr > 1 ? "s" : ""} ago`;
      const d = Math.floor(hr / 24);
      return `${d} day${d > 1 ? "s" : ""} ago`;
    }

    // Minimal MD5 for gravatar
    function md5cycle(x, k) {
      function cmn(q, a, b, x, s, t) {
        a = (a + q + x + t) | 0;
        return (((a << s) | (a >>> (32 - s))) + b) | 0;
      }
      function ff(a, b, c, d, x, s, t) { return cmn((b & c) | (~b & d), a, b, x, s, t); }
      function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & ~d), a, b, x, s, t); }
      function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
      function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | ~d), a, b, x, s, t); }

      let a = x[0], b = x[1], c = x[2], d = x[3];

      a = ff(a, b, c, d, k[0], 7, -680876936);
      d = ff(d, a, b, c, k[1], 12, -389564586);
      c = ff(c, d, a, b, k[2], 17, 606105819);
      b = ff(b, c, d, a, k[3], 22, -1044525330);
      a = ff(a, b, c, d, k[4], 7, -176418897);
      d = ff(d, a, b, c, k[5], 12, 1200080426);
      c = ff(c, d, a, b, k[6], 17, -1473231341);
      b = ff(b, c, d, a, k[7], 22, -45705983);
      a = ff(a, b, c, d, k[8], 7, 1770035416);
      d = ff(d, a, b, c, k[9], 12, -1958414417);
      c = ff(c, d, a, b, k[10], 17, -42063);
      b = ff(b, c, d, a, k[11], 22, -1990404162);
      a = ff(a, b, c, d, k[12], 7, 1804603682);
      d = ff(d, a, b, c, k[13], 12, -40341101);
      c = ff(c, d, a, b, k[14], 17, -1502002290);
      b = ff(b, c, d, a, k[15], 22, 1236535329);

      a = gg(a, b, c, d, k[1], 5, -165796510);
      d = gg(d, a, b, c, k[6], 9, -1069501632);
      c = gg(c, d, a, b, k[11], 14, 643717713);
      b = gg(b, c, d, a, k[0], 20, -373897302);
      a = gg(a, b, c, d, k[5], 5, -701558691);
      d = gg(d, a, b, c, k[10], 9, 38016083);
      c = gg(c, d, a, b, k[15], 14, -660478335);
      b = gg(b, c, d, a, k[4], 20, -405537848);
      a = gg(a, b, c, d, k[9], 5, 568446438);
      d = gg(d, a, b, c, k[14], 9, -1019803690);
      c = gg(c, d, a, b, k[3], 14, -187363961);
      b = gg(b, c, d, a, k[8], 20, 1163531501);
      a = gg(a, b, c, d, k[13], 5, -1444681467);
      d = gg(d, a, b, c, k[2], 9, -51403784);
      c = gg(c, d, a, b, k[7], 14, 1735328473);
      b = gg(b, c, d, a, k[12], 20, -1926607734);

      a = hh(a, b, c, d, k[5], 4, -378558);
      d = hh(d, a, b, c, k[8], 11, -2022574463);
      c = hh(c, d, a, b, k[11], 16, 1839030562);
      b = hh(b, c, d, a, k[14], 23, -35309556);
      a = hh(a, b, c, d, k[1], 4, -1530992060);
      d = hh(d, a, b, c, k[4], 11, 1272893353);
      c = hh(c, d, a, b, k[7], 16, -155497632);
      b = hh(b, c, d, a, k[10], 23, -1094730640);
      a = hh(a, b, c, d, k[13], 4, 681279174);
      d = hh(d, a, b, c, k[0], 11, -358537222);
      c = hh(c, d, a, b, k[3], 16, -722521979);
      b = hh(b, c, d, a, k[6], 23, 76029189);
      a = hh(a, b, c, d, k[9], 4, -640364487);
      d = hh(d, a, b, c, k[12], 11, -421815835);
      c = hh(c, d, a, b, k[15], 16, 530742520);
      b = hh(b, c, d, a, k[2], 23, -995338651);

      a = ii(a, b, c, d, k[0], 6, -198630844);
      d = ii(d, a, b, c, k[7], 10, 1126891415);
      c = ii(c, d, a, b, k[14], 15, -1416354905);
      b = ii(b, c, d, a, k[5], 21, -57434055);
      a = ii(a, b, c, d, k[12], 6, 1700485571);
      d = ii(d, a, b, c, k[3], 10, -1894986606);
      c = ii(c, d, a, b, k[10], 15, -1051523);
      b = ii(b, c, d, a, k[1], 21, -2054922799);
      a = ii(a, b, c, d, k[8], 6, 1873313359);
      d = ii(d, a, b, c, k[15], 10, -30611744);
      c = ii(c, d, a, b, k[6], 15, -1560198380);
      b = ii(b, c, d, a, k[13], 21, 1309151649);
      a = ii(a, b, c, d, k[4], 6, -145523070);
      d = ii(d, a, b, c, k[11], 10, -1120210379);
      c = ii(c, d, a, b, k[2], 15, 718787259);
      b = ii(b, c, d, a, k[9], 21, -343485551);

      x[0] = (x[0] + a) | 0;
      x[1] = (x[1] + b) | 0;
      x[2] = (x[2] + c) | 0;
      x[3] = (x[3] + d) | 0;
    }

    function md5blk(s) {
      const md5blks = [];
      for (let i = 0; i < 64; i += 4) {
        md5blks[i >> 2] =
          s.charCodeAt(i) +
          (s.charCodeAt(i + 1) << 8) +
          (s.charCodeAt(i + 2) << 16) +
          (s.charCodeAt(i + 3) << 24);
      }
      return md5blks;
    }

    function md51(s) {
      const n = s.length;
      const state = [1732584193, -271733879, -1732584194, 271733878];
      let i;
      for (i = 64; i <= n; i += 64) {
        md5cycle(state, md5blk(s.substring(i - 64, i)));
      }
      s = s.substring(i - 64);
      const tail = new Array(16).fill(0);
      for (i = 0; i < s.length; i++) {
        tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
      }
      tail[i >> 2] |= 0x80 << ((i % 4) << 3);
      if (i > 55) {
        md5cycle(state, tail);
        for (i = 0; i < 16; i++) tail[i] = 0;
      }
      tail[14] = n * 8;
      md5cycle(state, tail);
      return state;
    }

    function rhex(n) {
      const s = "0123456789abcdef";
      let j, out = "";
      for (j = 0; j < 4; j++) {
        out +=
          s.charAt((n >> (j * 8 + 4)) & 0x0f) +
          s.charAt((n >> (j * 8)) & 0x0f);
      }
      return out;
    }

    function hex(x) {
      for (let i = 0; i < x.length; i++) x[i] = rhex(x[i]);
      return x.join("");
    }

    function md5(s) {
      return hex(md51(s));
    }

    function gravatarUrl(email) {
      const hash = md5(email.trim().toLowerCase());
      return `https://www.gravatar.com/avatar/${hash}?d=identicon`;
    }

    function setUserUI(user) {
      const name = user.displayName || user.email || "NeonVault User";
      const email = user.email || "";
      userNameEl.textContent = name;
      userEmailEl.textContent = email;

      let avatar = user.photoURL;
      if (!avatar && email) {
        avatar = gravatarUrl(email);
      }
      if (!avatar) {
        avatar = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=1f2937&color=f9fafb";
      }
      userAvatar.src = avatar;
    }

    function renderNotes() {
      const q = searchInput.value.trim().toLowerCase();
      notesContainer.innerHTML = "";
      const filtered = allNotes.filter((n) =>
        !q || (n.text || "").toLowerCase().includes(q)
      );
      noteCount.textContent = filtered.length
        ? `${filtered.length} note${filtered.length > 1 ? "s" : ""}`
        : "";
      emptyState.classList.toggle("hidden", filtered.length > 0);

      filtered.forEach((note) => {
        const row = document.createElement("div");
        row.className =
          "flex items-start justify-between gap-3 px-3 py-2 rounded-2xl bg-slate-900/70 border border-slate-700/80";

        const left = document.createElement("div");
        left.className = "flex-1";

        const textEl = document.createElement("div");
        textEl.className = "text-sm text-slate-100 outline-none";
        textEl.contentEditable = "true";
        textEl.textContent = note.text || "";

        const meta = document.createElement("div");
        meta.className = "mt-1 text-[10px] text-slate-500";
        meta.textContent = timeAgo(note.created || Date.now());

        left.appendChild(textEl);
        left.appendChild(meta);

        const right = document.createElement("div");
        right.className = "flex flex-col gap-1";

        const saveBtn = document.createElement("button");
        saveBtn.className =
          "px-2 py-1 rounded-xl text-[10px] bg-emerald-500/90 hover:bg-emerald-400 text-white";
        saveBtn.textContent = "Save";

        const delBtn = document.createElement("button");
        delBtn.className =
          "px-2 py-1 rounded-xl text-[10px] bg-red-500/90 hover:bg-red-400 text-white";
        delBtn.textContent = "Delete";

        saveBtn.onclick = async () => {
          try {
            await updateDoc(doc(db, "notes", note.id), {
              text: textEl.textContent || ""
            });
            toast("Note updated", "success");
          } catch (e) {
            console.error(e);
            toast("Failed to update note", "error");
          }
        };

        delBtn.onclick = async () => {
          if (settings.confirmDelete) {
            if (!confirm("Delete this note?")) return;
          }
          try {
            await deleteDoc(doc(db, "notes", note.id));
            toast("Note deleted", "success");
          } catch (e) {
            console.error(e);
            toast("Failed to delete note", "error");
          }
        };

        right.appendChild(saveBtn);
        right.appendChild(delBtn);

        row.appendChild(left);
        row.appendChild(right);
        notesContainer.appendChild(row);
      });
    }

    function subscribeNotes(user) {
      const notesRef = collection(db, "notes");
      const qNotes = query(
        notesRef,
        where("userId", "==", user.uid),
        orderBy("created", "desc")
      );

      onSnapshot(
        qNotes,
        (snap) => {
          allNotes = [];
          snap.forEach((docSnap) => {
            allNotes.push({ id: docSnap.id, ...docSnap.data() });
          });
          renderNotes();
        },
        (err) => {
          console.error("onSnapshot error", err);
          toast("Failed to load notes", "error");
        }
      );
    }

    // Auth state
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      setUserUI(user);
      loadSettings();
      subscribeNotes(user);
    });

    // Add note
    addNoteBtn.onclick = async () => {
      const text = newNoteEl.value.trim();
      if (!text) {
        toast("Note is empty", "error");
        return;
      }
      try {
        await addDoc(collection(db, "notes"), {
          userId: currentUser.uid,
          text,
          created: Date.now()
        });
        toast("Note added", "success");
        if (settings.autoClear) newNoteEl.value = "";
      } catch (e) {
        console.error(e);
        toast("Failed to add note", "error");
      }
    };

    // Search
    searchInput.addEventListener("input", () => {
      renderNotes();
    });

    // Logout
    logoutBtn.onclick = async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (e) {
        console.error(e);
        toast("Failed to logout", "error");
      }
    };

    // Settings modal
    avatarBtn.onclick = () => {
      settingsOverlay.classList.remove("hidden");
    };
    closeSettingsBtn.onclick = () => {
      settingsOverlay.classList.add("hidden");
    };
    settingsOverlay.onclick = (e) => {
      if (e.target === settingsOverlay) {
        settingsOverlay.classList.add("hidden");
      }
    };
    saveSettingsBtn.onclick = () => {
      saveSettings();
      toast("Settings saved", "success");
      settingsOverlay.classList.add("hidden");
    };
  </script>
</body>
</html>
