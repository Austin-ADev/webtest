<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up</title>
  <style> /* same basic styling as above */ </style>
</head>
<body>
  <h1>Account</h1>
  
  <input type="email" id="email" placeholder="Email" style="display:block; margin:10px auto; padding:10px; width:250px;">
  <input type="password" id="password" placeholder="Password" style="display:block; margin:10px auto; padding:10px; width:250px;">
  
  <button id="login-btn">Login</button>
  <button id="signup-btn">Sign Up</button>

  <p id="message" style="color:red;"></p>

  <script type="module">
    const firebaseConfig = {
  apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
  authDomain: "webtest-4943a.firebaseapp.com",
  projectId: "webtest-4943a",
  storageBucket: "webtest-4943a.firebasestorage.app",
  messagingSenderId: "84924124626",
  appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
  measurementId: "G-9MNX5MX0Z2"
};

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const message = document.getElementById('message');

    document.getElementById('signup-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => { window.location.href = 'index.html'; })
        .catch(err => { message.textContent = err.message; });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      signInWithEmailAndPassword(auth, email, password)
        .then(() => { window.location.href = 'index.html'; })
        .catch(err => { message.textContent = err.message; });
    });
  </script>
</body>
</html>
