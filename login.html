<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeonVault – Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
    }
    .glass {
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148,163,184,0.35);
    }
    .toast {
      animation: slideIn 0.35s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast-hide {
      opacity: 0 !important;
      transform: translateY(10px) scale(0.95) !important;
      transition: all 0.25s ease;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-100">

  <!-- Toasts -->
  <div id="toastContainer" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <div class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl mx-4">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-indigo-500 via-fuchsia-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/40">
        <span class="text-2xl font-bold">NV</span>
      </div>
      <h1 class="mt-4 text-2xl font-semibold tracking-tight">NeonVault</h1>
      <p class="text-sm text-slate-400 mt-1 text-center">Modern, synced notes in the cloud.</p>
    </div>

    <!-- Email / Password -->
    <div class="space-y-3 mb-4">
      <input id="emailInput" type="email" placeholder="Email"
             class="w-full px-3 py-2.5 rounded-xl bg-slate-900/60 border border-slate-700/70 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      <input id="passwordInput" type="password" placeholder="Password"
             class="w-full px-3 py-2.5 rounded-xl bg-slate-900/60 border border-slate-700/70 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>

    <div class="flex gap-3 mb-4">
      <button id="emailLoginBtn"
              class="w-1/2 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 bg-indigo-500 hover:bg-indigo-400 transition">
        Login
      </button>
      <button id="emailSignupBtn"
              class="w-1/2 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 transition">
        Sign up
      </button>
    </div>

    <div class="flex items-center my-4">
      <div class="flex-1 h-px bg-slate-700/70"></div>
      <span class="px-3 text-xs uppercase tracking-wide text-slate-500">or continue with</span>
      <div class="flex-1 h-px bg-slate-700/70"></div>
    </div>

    <!-- OAuth buttons -->
    <div class="space-y-3">
      <button id="googleBtn"
              class="w-full py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 bg-white text-slate-900 hover:bg-slate-100 transition">
        <span class="text-lg">🟢</span>
        <span>Google</span>
      </button>
      <button id="githubBtn"
              class="w-full py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 bg-slate-900 border border-slate-700 hover:bg-slate-800 transition">
        <span class="text-lg">🐙</span>
        <span>GitHub</span>
      </button>
    </div>
  </div>

  <!-- Firebase v12 (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      GithubAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    // TODO: replace with your real config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID",
      measurementId: "YOUR_MEASUREMENT_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const githubProvider = new GithubAuthProvider();

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const emailLoginBtn = document.getElementById("emailLoginBtn");
    const emailSignupBtn = document.getElementById("emailSignupBtn");
    const googleBtn = document.getElementById("googleBtn");
    const githubBtn = document.getElementById("githubBtn");
    const toastContainer = document.getElementById("toastContainer");

    function toast(message, type = "info") {
      const div = document.createElement("div");
      const colors = {
        info: "bg-slate-800/90 text-slate-100",
        success: "bg-emerald-500/90 text-white",
        error: "bg-red-500/90 text-white"
      };
      div.className =
        `toast px-4 py-2 rounded-xl text-sm shadow-xl cursor-pointer ${colors[type]}`;
      div.textContent = message;

      div.onclick = () => {
        div.classList.add("toast-hide");
        setTimeout(() => div.remove(), 250);
      };

      toastContainer.appendChild(div);

      setTimeout(() => {
        if (div.parentNode) {
          div.classList.add("toast-hide");
          setTimeout(() => div.remove(), 250);
        }
      }, 4000);
    }

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    emailLoginBtn.onclick = async () => {
      const email = emailInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!email || !pass) return toast("Email and password required", "error");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        toast("Logged in", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        toast(err.message || "Login failed", "error");
      }
    };

    emailSignupBtn.onclick = async () => {
      const email = emailInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!email || !pass) return toast("Email and password required", "error");
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        toast("Account created", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        toast(err.message || "Signup failed", "error");
      }
    };

    googleBtn.onclick = async () => {
      try {
        await signInWithPopup(auth, googleProvider);
        toast("Logged in with Google", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        toast(err.message || "Google login failed", "error");
      }
    };

    githubBtn.onclick = async () => {
      try {
        await signInWithPopup(auth, githubProvider);
        toast("Logged in with GitHub", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
        toast(err.message || "GitHub login failed", "error");
      }
    };
  </script>
</body>
</html>
