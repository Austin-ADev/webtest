<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NeonVault — Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50"></div>

  <main class="glass max-w-md w-full rounded-3xl p-8 shadow-2xl mx-4">
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-indigo-500 via-fuchsia-500 to-cyan-400 flex items-center justify-center shadow-lg">
        <span class="text-2xl font-bold">NV</span>
      </div>
      <h1 class="mt-4 text-2xl font-semibold tracking-tight text-slate-100">NeonVault</h1>
      <p class="text-sm text-slate-400 mt-1 text-center">Modern, synced notes in the cloud.</p>
    </div>

    <div class="space-y-3 mb-4">
      <input id="emailInput" type="email" placeholder="Email"
             class="w-full px-3 py-2.5 rounded-xl bg-slate-900/60 border border-slate-700 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      <input id="passwordInput" type="password" placeholder="Password"
             class="w-full px-3 py-2.5 rounded-xl bg-slate-900/60 border border-slate-700 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>

    <div class="flex gap-3 mb-4">
      <button id="emailLoginBtn" class="w-1/2 py-2.5 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-medium">Login</button>
      <button id="emailSignupBtn" class="w-1/2 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-100 font-medium">Sign up</button>
    </div>

    <div class="flex items-center my-4">
      <div class="flex-1 h-px bg-slate-700/70"></div>
      <span class="px-3 text-xs uppercase tracking-wide text-slate-500">or continue with</span>
      <div class="flex-1 h-px bg-slate-700/70"></div>
    </div>

    <div class="space-y-3">
      <button id="googleBtn" class="w-full py-2.5 rounded-xl bg-white text-slate-900 flex items-center justify-center gap-3">
        <span class="text-lg">🟢</span><span>Continue with Google</span>
      </button>
      <button id="githubBtn" class="w-full py-2.5 rounded-xl bg-slate-900 text-slate-100 flex items-center justify-center gap-3 border border-slate-700">
        <span class="text-lg">🐙</span><span>Continue with GitHub</span>
      </button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      GithubAuthProvider,
      signInWithPopup,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    /* Inserted Firebase config (provided) */
    const firebaseConfig = {
      apiKey: "AIzaSyBzVYrsnc8NAE-tr9XTEVbSeRY9GL2yHVg",
      authDomain: "webtest-4943a.firebaseapp.com",
      projectId: "webtest-4943a",
      storageBucket: "webtest-4943a.firebasestorage.app",
      messagingSenderId: "84924124626",
      appId: "1:84924124626:web:73098a19326ed1a4ec8c0b",
      measurementId: "G-9MNX5MX0Z2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const githubProvider = new GithubAuthProvider();

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const emailLoginBtn = document.getElementById("emailLoginBtn");
    const emailSignupBtn = document.getElementById("emailSignupBtn");
    const googleBtn = document.getElementById("googleBtn");
    const githubBtn = document.getElementById("githubBtn");
    const toastContainer = document.getElementById("toastContainer");

    /* Toast helper (title, subtitle, type) */
    function createToast(title, subtitle = "", type = "info", link = null) {
      const el = document.createElement("div");
      const typeClass = type === "success" ? "nv-success" : type === "warning" ? "nv-warning" : "nv-error";
      el.className = `nv-toast nv-animate-in ${typeClass}`;
      const icon = type === "success" ? "✨" : type === "warning" ? "⚠️" : "🚫";
      el.innerHTML = `
        <div class="nv-icon">${icon}</div>
        <div class="nv-body">
          <div class="nv-title">${title}</div>
          <div class="nv-sub">${subtitle}</div>
          ${link ? `<a href="${link}" target="_blank" rel="noopener">Open link</a>` : ""}
        </div>
      `;
      el.onclick = () => {
        el.classList.remove("nv-animate-in");
        el.classList.add("nv-animate-out");
        setTimeout(() => el.remove(), 220);
      };
      toastContainer.appendChild(el);
      setTimeout(() => {
        if (document.body.contains(el)) {
          el.classList.add("nv-animate-out");
          setTimeout(() => el.remove(), 220);
        }
      }, 4200);
    }

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "index.html";
    });

    emailLoginBtn.onclick = async () => {
      const email = emailInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!email || !pass) return createToast("Missing credentials", "Enter email and password", "warning");
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        createToast("Welcome back", "Signing you in…", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error("Email login error:", err);
        createToast("Login failed", err.message || "Check credentials", "error");
      }
    };

    emailSignupBtn.onclick = async () => {
      const email = emailInput.value.trim();
      const pass = passwordInput.value.trim();
      if (!email || !pass) return createToast("Missing credentials", "Enter email and password", "warning");
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        createToast("Account created", "Welcome to NeonVault", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error("Signup error:", err);
        createToast("Signup failed", err.message || "Try again", "error");
      }
    };

    googleBtn.onclick = async () => {
      try {
        await signInWithPopup(auth, googleProvider);
        createToast("Signed in with Google", "Welcome", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error("Google sign-in error:", err);
        createToast("Google sign-in failed", err.message || "Try again", "error");
      }
    };

    githubBtn.onclick = async () => {
      try {
        await signInWithPopup(auth, githubProvider);
        createToast("Signed in with GitHub", "Welcome", "success");
        window.location.href = "index.html";
      } catch (err) {
        console.error("GitHub sign-in error:", err);
        createToast("GitHub sign-in failed", err.message || "Try again", "error");
      }
    };
  </script>
</body>
</html>
