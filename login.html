<!DOCTYPE html>
<html>
<head>
  <title>Login – ADev Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container card">
    <h1>ADev Notes</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="emailLoginBtn">Login with Email</button>

    <hr>

    <button id="googleBtn">Login with Google</button>
    <button id="githubBtn">Login with GitHub</button>

    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

  <script type="module">
    import {
      auth,
      googleProvider,
      githubProvider,
      signInWithPopup,
      signInWithEmailAndPassword
    } from "./firebase.js";

    document.getElementById("googleBtn").onclick = () =>
      signInWithPopup(auth, googleProvider).then(() => {
        window.location.href = "index.html";
      });

    document.getElementById("githubBtn").onclick = () =>
      signInWithPopup(auth, githubProvider).then(() => {
        window.location.href = "index.html";
      });

    document.getElementById("emailLoginBtn").onclick = async () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = "index.html";
    };
  </script>

</body>
</html>
